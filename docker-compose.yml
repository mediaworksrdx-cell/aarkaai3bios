version: "3.8"

services:
  aarkaai:
    build: .
    container_name: aarkaai-backend
    restart: unless-stopped
    ports:
      - "${AARKAAI_PORT:-5000}:5000"
    volumes:
      # Persist database
      - ./aarkaai.db:/home/aarkaai/app/aarkaai.db
      # Persist model files (avoid re-download)
      - ./aarkaa-3b:/home/aarkaai/app/aarkaa-3b:ro
      # Workspace for agent tools
      - aarkaai-workspace:/home/aarkaai/app/workspace
    env_file:
      - .env
    environment:
      - AARKAAI_ENV=production
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  aarkaai-workspace:
