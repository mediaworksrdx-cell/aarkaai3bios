name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Aarkaai iOS App
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios-app
          xcodegen generate

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Build for Simulator
        run: |
          cd ios-app
          xcodebuild build \
            -project AarkaaiApp.xcodeproj \
            -scheme AarkaaiApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -configuration Debug \
            -derivedDataPath Build/ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" && echo '✅ BUILD SUCCEEDED' || echo '❌ BUILD FAILED'

      - name: List Build Products (Debug)
        run: ls -R ios-app/Build/Build/Products/Debug-iphonesimulator/ || true

      - name: Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aarkaai-ios-simulator-build
          path: ios-app/Build/Build/Products/Debug-iphonesimulator/AARKAAI.app
