name: AarkaaiApp
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/MarkdownUI.git
    from: 2.1.0

targets:
  AarkaaiApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - AarkaaiApp
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: AARKAAI
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: NO
        SWIFT_VERSION: 5.0
        SDKROOT: iphoneos
        TARGETED_DEVICE_FAMILY: "1,2"
        # Native Launch Screen (iOS 14+)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
      configs:
        debug:
          MTL_ENABLE_DEBUG_INFO: YES
        release:
          MTL_ENABLE_DEBUG_INFO: NO
